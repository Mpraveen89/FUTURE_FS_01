<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M. PRAVEEN - Portfolio</title>
    <!-- Tailwind and pre-bundled design assets -->
    <link rel="stylesheet" href="/assets/index-BRYNMWrH.css" />
    <!-- Remix Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes spin-reverse {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(0.85); opacity: 0.6; }
        50% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Immersive Tech Preloader -->
    <div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #010008; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease, visibility 0.6s ease;">
      <!-- Glowing Ambient Aura -->
      <div style="position: absolute; width: 300px; height: 300px; background: rgba(0, 212, 170, 0.05); border-radius: 50%; filter: blur(80px); pointer-events: none;"></div>
      
      <div style="position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <!-- Glowing Tech Rings -->
        <div style="position: relative; width: 80px; height: 80px; margin-bottom: 24px;">
          <!-- Neon Teal Outer Ring -->
          <div style="box-sizing: border-box; position: absolute; width: 100%; height: 100%; border: 3px solid transparent; border-top-color: #00d4aa; border-bottom-color: #00d4aa; border-radius: 50%; animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;"></div>
          <!-- Amber Teal Inner Ring -->
          <div style="box-sizing: border-box; position: absolute; top: 10px; left: 10px; width: 60px; height: 60px; border: 3px solid transparent; border-left-color: #d97706; border-right-color: #d97706; border-radius: 50%; animation: spin-reverse 0.9s linear infinite; opacity: 0.85;"></div>
          <!-- Pulsing Core -->
          <div style="position: absolute; top: 25px; left: 25px; width: 30px; height: 30px; background: #00d4aa; border-radius: 50%; transform: scale(0.8); animation: pulse 1.8s ease-in-out infinite; box-shadow: 0 0 15px #00d4aa;"></div>
        </div>
        
        <!-- Animated Name Subtext -->
        <h2 style="font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 600; color: #ffffff; margin: 0 0 8px 0; letter-spacing: 0.08em; text-transform: uppercase;">M. Praveen</h2>
        <p id="loading-text" style="font-family: monospace; font-size: 10px; color: #00d4aa; margin: 0; letter-spacing: 0.25em; text-transform: uppercase;">Initializing Systems...</p>
      </div>
    </div>

    <script>
      // Automatically fade out preloader once window loaded completely
      window.addEventListener('load', () => {
        const loader = document.getElementById('loading-screen');
        const loadText = document.getElementById('loading-text');
        if (loadText) loadText.innerHTML = "Systems Online";
        setTimeout(() => {
          if (loader) {
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
          }
        }, 500);
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/assets/config-DOSGiU7Q.js"></script>
    <script type="module" src="/assets/index-FGyO6ffj.js"></script>
  </body>
</html>
